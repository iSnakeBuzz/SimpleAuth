file-version: 1

settings:
  registration-timeout: 60 # Time in seconds before a non-registered player is kicked
  login-timeout: 60 # Time in seconds before a non-logged in player is kicked
  premium-bypass: true # Allow premium players to bypass authentication - If false, all players must authenticate, premiums have /premium command

servers:
  auth_servers:
    - 'auth-1'
  lobby_servers:
    - 'lobby-1'

# MongoDB database connection
mongo:
  uri: 'mongodb://localhost:27017'
  database: 'simple-auth'

# Geyser/Floodgate support (optional)
# This section is only active if the Floodgate plugin is installed on this Velocity proxy.
# If Floodgate is not present, all settings here are ignored entirely.
geyser:
  enabled: true            # Master toggle for Bedrock support
  auto-bypass-auth: true   # Bedrock players are already authenticated by Xbox Live via Floodgate.
                           # When true, they skip /login and /register entirely.
                           # When false, Bedrock players must still authenticate manually (not recommended).
