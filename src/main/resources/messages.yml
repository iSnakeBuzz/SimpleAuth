file-version: 1

# Use MiniMessage formatting :)
messages:
  no-lobby-server: <red>There is no lobby server!
  captcha-failed: <red>Incorrect captcha!
  not-logged-in: <red>You are not logged in! Please login using <yellow>/login <password>
  not-registered: <red>You are not registered! Please register using <yellow>/register <password> <password>
  register-usage: '<red>Usage: <yellow>/register <password> <password>'
  login-usage: '<red>Usage: <yellow>/login <password>'
  registering: <yellow>Registering...
  logging-in: <yellow>Logging in...
  login-failed: <red>Login failed!
  login-success: <green>Successfully logged in!
  passwords-not-match: <red>Passwords do not match!
  register-success: <green>Successfully registered!
  too-many-attempts: <red>You have attempted to login too many times!
  already-logged-in: <red>You are already logged in!
  already-registered: <red>You are already registered!
  change-password-usage: '<red>Usage: <yellow>/changepassword <old password> <new password> <new password>'
  changing-password: <yellow>Changing password...
  password-changed: <red>Your password has been changed!
  unregister-usage: '<red>Usage: <yellow>/unregister <username>'
  unregister-success: <green>Successfully unregistered <username>!
  unregister-not-registered: <red>This user is not registered!
  unregister-error: <red>An error occurred while unregistering the player.
  kick-message: <red>You have been unregistered by an administrator.
  resetpass-usage: '<red>Usage: <yellow>/resetpass <username>'
  resetpass-success: <green>Successfully reset the password for <username>!
  resetpass-not-registered: <red>This user is not registered!
  resetpass-error: <red>An error occurred while resetting the password.
  resetpass-notify: <green>Your password has been reset by an administrator.
